<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau de bord ACI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(160deg,#f5f4f0,#e8e6df);display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
#box{background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:20px;padding:40px 36px;width:320px;max-width:90vw;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.12)}
#box img{height:100px;width:auto;border-radius:12px;margin-bottom:18px}
h2{color:#1a1a18;font-size:17px;font-weight:700;margin-bottom:4px}
p{color:#888;font-size:11px;margin-bottom:26px}
input{width:100%;padding:12px 16px;border-radius:10px;border:1.5px solid rgba(0,0,0,0.15);background:#f8f7f4;color:#1a1a18;font-size:15px;letter-spacing:2px;text-align:center;outline:none;box-sizing:border-box;margin-bottom:12px}
input:focus{border-color:#E24B4A;background:#fff}
button{width:100%;padding:13px;border-radius:10px;border:none;background:#E24B4A;color:#fff;font-size:15px;font-weight:700;cursor:pointer}
#err{color:#E24B4A;font-size:12px;margin-top:8px;display:none;font-weight:500}
</style>
</head>
<body>
<div id="box">
  <img src="logo-cgt.png" alt="CGT ACI">
  <h2>Tableau de bord ACI</h2>
  <p>FNPOS-CGT - Ateliers Chantiers d'Insertion</p>
  <input type="password" id="pwd" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')check()">
  <button onclick="check()">Acceder</button>
  <div id="err">Mot de passe incorrect</div>
</div>
<script>
function check(){
  var p=document.getElementById('pwd').value,h=0;
  for(var i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0;}
  if(h===1316466028){
    window.location.href='ACI_France_Dashboard.htm';
  } else {
    var e=document.getElementById('err');
    e.style.display='block';
    document.getElementById('pwd').value='';
    setTimeout(function(){e.style.display='none';},3000);
  }
}
</script>
</body>
</html>
