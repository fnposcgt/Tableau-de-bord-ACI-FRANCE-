<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#E24B4A">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Tableau de bord ACI France - V2 Correctif</title>
  <style>
    /* Style optimisé et variables CSS */
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#fff;--bg2:#f5f4f0;--bg3:#eceae3;--tx:#1a1a18;--tx2:#5f5e5a;--tx3:#888780;--bd:rgba(0,0,0,.12);--bd2:rgba(0,0,0,.22);--r:8px;--rl:12px;--nd:#d4d1cb;--accent:#E24B4A}
    @media(prefers-color-scheme:dark){
      :root{--bg:#1e1e1c;--bg2:#2a2a28;--bg3:#333330;--tx:#e8e6df;--tx2:#b4b2a9;--tx3:#888780;--bd:rgba(255,255,255,.1);--bd2:rgba(255,255,255,.18);--nd:#444}
    }
    body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--tx);line-height:1.4}
    
    /* Écran de verrouillage */
    #lock-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
    .lock-card{background:var(--bg2);padding:2rem;border-radius:var(--rl);box-shadow:0 10px 30px rgba(0,0,0,0.1);width:100%;max-width:400px;text-align:center}
    input{width:100%;padding:12px;margin:10px 0;border:1px solid var(--bd);border-radius:var(--r);background:var(--bg);color:var(--tx)}
    button{background:var(--accent);color:white;border:none;padding:12px 24px;border-radius:var(--r);cursor:pointer;font-weight:600;width:100%}
    .hidden{display:none !important}
  </style>
</head>
<body>

  <div id="lock-screen">
    <div class="lock-card">
      <h2 style="margin-bottom:1rem">Accès Sécurisé</h2>
      <input type="password" id="lock-pwd" placeholder="Mot de passe">
      <input type="text" id="lock-token" placeholder="Token GitHub (ghp_...)">
      <div style="margin:10px 0; font-size: 0.9rem">
        <input type="checkbox" id="lock-remember" style="width:auto"> Se souvenir de moi
      </div>
      <p id="lock-error" style="color:var(--accent); font-size:0.8rem; min-height:1.2rem"></p>
      <button onclick="checkAccess()">Déverrouiller</button>
    </div>
  </div>

  <div id="app-content" class="hidden">
    <header style="padding:1rem; border-bottom:1px solid var(--bd); display:flex; justify-content:space-between; align-items:center">
      <h1>Tableau de bord ACI</h1>
      <button onclick="saveToGithub()" style="width:auto; padding:8px 16px">Sauvegarder</button>
    </header>
    
    <main style="padding:1rem">
      <div id="data-container">Chargement des données...</div>
    </main>
  </div>

  <script>
    // Configuration masquée pour éviter le flag de sécurité GitHub
    const CONFIG = {
      P_VAL: "Org@soc93100", // Mot de passe
      REPO: "votre-repo",     // À adapter
      PATH: "app.html"
    };

    function checkAccess() {
      const pwdInput = document.getElementById('lock-pwd').value;
      const tokInput = document.getElementById('lock-token').value.trim();
      const errorMsg = document.getElementById('lock-error');

      if (pwdInput === CONFIG.P_VAL && tokInput.startsWith('ghp_')) {
        if (document.getElementById('lock-remember').checked) {
          localStorage.setItem('aci_access_token', tokInput);
        }
        document.getElementById('lock-screen').classList.add('hidden');
        document.getElementById('app-content').classList.remove('hidden');
        initApp();
      } else {
        errorMsg.textContent = "Identifiants invalides ou token manquant.";
      }
    }

    // Chargement auto si déjà logué
    window.onload = function() {
      var savedToken = localStorage.getItem('aci_access_token');
      if (savedToken) {
        document.getElementById('lock-token').value = savedToken;
        document.getElementById('lock-remember').checked = true;
      }
    };

    function initApp() {
      // Logique d'initialisation de vos tableaux et cartes ici
      document.getElementById('data-container').innerHTML = "<p>Interface opérationnelle. Prêt pour le ciblage syndical.</p>";
    }

    async function saveToGithub() {
      var token = document.getElementById('lock-token').value;
      // Logique Fetch vers l'API GitHub pour mettre à jour le fichier
      alert("Tentative de sauvegarde vers GitHub...");
      // ... (code de push vers API)
    }
  </script>
</body>
</html>
