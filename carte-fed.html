<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Carte Fédérale FNPOS-CGT</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#0f1117;--bg2:#181c27;--bg3:#1e2334;--bd:#2a3050;--tx:#e8ecf4;--tx2:#9aa3bd;--tx3:#6b7494}
body.light{--bg:#f0f2f8;--bg2:#fff;--bg3:#e8ebf4;--bd:#d0d5e8;--tx:#1a1d2e;--tx2:#4a5070;--tx3:#8892b0}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);display:flex;flex-direction:column}
#tb{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--bd);flex-shrink:0;z-index:1000}
#tb h1{font-size:13px;font-weight:700;white-space:nowrap}
#tb h1 span{color:#E24B4A}
#tmbtn,a.bk{padding:4px 8px;border-radius:5px;border:1px solid var(--bd);background:var(--bg3);color:var(--tx2);font-size:11px;cursor:pointer;text-decoration:none;white-space:nowrap}
#tmbtn{margin-left:auto}
#wrap{display:flex;flex:1;overflow:hidden;min-height:0}
#sb{width:200px;min-width:200px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--bd);overflow-y:auto;display:flex;flex-direction:column}
#mw{flex:1;position:relative}
#map{width:100%;height:100%;background:#1a1a2e}
.fs{padding:9px 10px 6px;border-bottom:1px solid var(--bd)}
.ft{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:7px}
button.sf{display:flex;align-items:center;gap:5px;width:100%;padding:5px 8px;border-radius:6px;border:1px solid transparent;background:transparent;font-size:11px;font-weight:600;cursor:pointer;text-align:left;margin-bottom:3px;color:var(--tx2)}
button.sf:hover{background:var(--bg3)}
button.sf.on{border-color:currentColor;background:rgba(128,128,128,.12)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.nb{margin-left:auto;font-size:9px;opacity:.6;font-weight:400}
button.mb{display:flex;align-items:center;gap:6px;width:100%;padding:5px 8px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--tx2);font-size:11px;cursor:pointer;margin-bottom:3px;text-align:left}
button.mb:hover{background:var(--bg3)}
button.mb.on{border-color:#E24B4A;background:rgba(226,75,74,.1);color:var(--tx);font-weight:600}
.slw{margin-bottom:8px}
.sll{display:flex;justify-content:space-between;font-size:10px;color:var(--tx2);margin-bottom:4px}
input[type=range]{width:100%;height:4px;accent-color:#E24B4A;background:var(--bg3);border-radius:2px;cursor:pointer;display:block}
#bar{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:900;background:var(--bg2);border:1px solid var(--bd);border-radius:7px;padding:5px 12px;font-size:11px;color:var(--tx2);display:none;white-space:nowrap}
#st{position:absolute;bottom:20px;left:10px;z-index:900;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:7px 11px;display:flex;gap:12px}
.si{text-align:center}.sv{font-size:15px;font-weight:700;color:#E24B4A;line-height:1.1}.sl{font-size:9px;color:var(--tx3);margin-top:2px}
#leg{position:absolute;bottom:20px;right:10px;z-index:900;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:9px 11px;font-size:10px}
#legt{font-weight:700;font-size:11px;margin-bottom:6px;color:var(--tx)}
.lr{display:flex;align-items:center;gap:6px;margin-bottom:3px;color:var(--tx2)}
.ls{width:11px;height:11px;border-radius:2px;flex-shrink:0}
.leaflet-popup-content-wrapper{background:var(--bg2)!important;border:1px solid var(--bd)!important;border-radius:8px!important}
.leaflet-popup-content{color:var(--tx)!important;font-size:12px!important;margin:10px 14px!important;max-width:260px}
.leaflet-popup-tip{background:var(--bg2)!important}
.pr{display:flex;justify-content:space-between;padding:2px 0;font-size:11px;border-bottom:1px solid var(--bd)}
.pr:last-of-type{border:none}
.pk{color:var(--tx2)}.pv{font-weight:600}
.pp{display:flex;flex-wrap:wrap;gap:3px;margin-top:7px}
.pi{border-radius:3px;padding:2px 5px;font-size:10px;font-weight:700}
.pln{display:block;margin-top:7px;font-size:10px;text-decoration:none;color:#E24B4A}
@media(max-width:600px){
  #wrap{flex-direction:column}
  #sb{width:100%;min-width:0;flex-direction:row;height:130px;flex-shrink:0;overflow-x:auto;overflow-y:hidden;border-right:none;border-bottom:1px solid var(--bd)}
  .fs{min-width:120px;flex-shrink:0}
  #mw{flex:1;min-height:0}
  #st{gap:8px;padding:5px 8px}
  .sv{font-size:13px}
}
</style>
</head>

    </div>
    <div class="fs">
      <div class="ft">Structures min.</div>
      <div class="slw">

    </div>
    <div class="fs">
      <div class="ft">Granularite</div>

  </div>
  <div id="mw">
    <div id="map"></div>
    <div id="st">

    </div>
    <div id="leg"><div id="legt">Score CGT %</div><div id="legb"></div></div>

</div>

      var sm=SM[d.secs[i]]||{l:d.secs[i],c:'#888'};
      var sd=(DS[d.secs[i]]||{})[code];
      if(!sd&&code.length===2&&code[0]==='0')sd=(DS[d.secs[i]]||{})[code[1]];
      var snd=sd&&sd.pa!==null?(' · '+sd.pa+'%'):'';
      h+='<span class="pi" style="background:'+sm.c+'22;color:'+sm.c+'">'+d.secs[i].toUpperCase()+snd+'</span>';
    }
    h+='</div>';
  }
  if(_sec!=='all'){
    var sm=SM[_sec]||{l:_sec};
    var href=_sec==='aci'?'app.html?readonly':'app-secteur.html?sec='+_sec+'&readonly';
    h+='<a href="'+href+'" class="pln">&rarr; Tableau de bord '+sm.l+'</a>';
    if(_sec==='aci') h+='<div style="font-size:9px;color:var(--tx3);margin-top:4px">Donn\u00e9es XLSX r\u00e9gionaux · Carte compl\u00e8te dans le tableau de bord ACI</div>';
  }
  return h;
}
function render(){
  var layer=_zm==='dept'?_ld:_lr;
  if(!layer)return;
  layer.eachLayer(function(l){
    l.setStyle(getStyle(l.feature));
    l.unbindPopup();
    l.bindPopup(mkPop(l.feature),{maxWidth:280});
  });
  updSt(); updLeg();
}
function updSt(){
  var nb=0,ins=0,cgt=0,sve=0,nd=0,seen={};
  var secs=_sec==='all'?Object.keys(DS):[_sec];
  for(var i=0;i<secs.length;i++){
    for(var d in(DS[secs[i]]||{})){
      var v=DS[secs[i]][d];
      if(!v||v.nb<_mst)continue;
      if(!seen[d]){seen[d]=1;nd++;}
      nb+=v.nb||0; ins+=v['in']||0; cgt+=v.cgt||0; sve+=v['in']||0;
    }
  }
  var pa=sve>0?Math.round(cgt/sve*100)+'%':'-';
  document.getElementById('s-nb').textContent=nb.toLocaleString('fr-FR');
  document.getElementById('s-d').textContent=nd;
  document.getElementById('s-i').textContent=ins.toLocaleString('fr-FR');
  document.getElementById('s-pa').textContent=pa;
}
function updLeg(){
  var t=document.getElementById('legt'),b=document.getElementById('legb');
  if(_mode==='score'){
    t.textContent='Score CGT %';
    b.innerHTML='<div class="lr"><div class="ls" style="background:#15803d"></div>&ge;50%</div>'
      +'<div class="lr"><div class="ls" style="background:#16a34a"></div>40-50%</div>'
      +'<div class="lr"><div class="ls" style="background:#65a30d"></div>30-40%</div>'
      +'<div class="lr"><div class="ls" style="background:#ca8a04"></div>20-30%</div>'
      +'<div class="lr"><div class="ls" style="background:#dc2626"></div>10-20%</div>'
      +'<div class="lr"><div class="ls" style="background:#9f1239"></div>&lt;10%</div>'
      +'<div class="lr"><div class="ls" style="background:#4a6fa5"></div>Chargement</div>';
  }else if(_mode==='nb'){
    t.textContent='Nb structures';
    b.innerHTML='<div class="lr"><div class="ls" style="background:#0369a1"></div>&ge;100</div>'
      +'<div class="lr"><div class="ls" style="background:#0ea5e9"></div>20-99</div>'
      +'<div class="lr"><div class="ls" style="background:#38bdf8"></div>5-19</div>'
      +'<div class="lr"><div class="ls" style="background:#bae6fd"></div>1-4</div>';
  }else{
    t.textContent='Presence CGT';
    b.innerHTML='<div class="lr"><div class="ls" style="background:#16a34a"></div>Presente</div>'
      +'<div class="lr"><div class="ls" style="background:#1e2740"></div>Absente</div>';
  }
}
function setSec(sk){
  _sec=sk;
  document.querySelectorAll('button.sf').forEach(function(b){b.classList.remove('on');});
  var btn=document.getElementById('b-'+sk);
  if(btn)btn.classList.add('on');
  render();
}
function setMode(m){
  _mode=m;
  document.querySelectorAll('button.mb[id^=m-]').forEach(function(b){b.classList.remove('on');});
  var btn=document.getElementById('m-'+m);
  if(btn)btn.classList.add('on');
  render();
}
function setZoom(z){
  _zm=z;
  document.querySelectorAll('button.mb[id^=z-]').forEach(function(b){b.classList.remove('on');});
  var btn=document.getElementById('z-'+z);
  if(btn)btn.classList.add('on');
  if(_ld&&_lr){
    if(z==='dept'){if(!_map.hasLayer(_ld))_map.addLayer(_ld);if(_map.hasLayer(_lr))_map.removeLayer(_lr);}
    else{if(_map.hasLayer(_ld))_map.removeLayer(_ld);if(!_map.hasLayer(_lr))_map.addLayer(_lr);}
  }
  render();
}
function onSl(){
  _msc=parseInt(document.getElementById('slsc').value)||0;
  _mst=parseInt(document.getElementById('slst').value)||1;
  document.getElementById('vsc').textContent=_msc;
  document.getElementById('vst').textContent=_mst;
  render();
}
function toggleTheme(){
  document.body.classList.toggle('light');
  var l=document.body.classList.contains('light');
  document.getElementById('tmbtn').textContent=l?'\uD83C\uDF19':'\u2728\uFE0F';
  try{localStorage.setItem('fnpos_theme',l?'light':'dark');}catch(e){}
  if(_map)_map.eachLayer(function(lyr){
    if(lyr._url&&lyr._url.indexOf('carto')>=0){
      lyr.setUrl(l?'https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}.png'
                  :'https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}.png');
    }
  });
}

/* === Initialisation === */
window.addEventListener('load',function(){
  try{var sv=localStorage.getItem('fnpos_theme');if(sv==='light')document.body.classList.add('light');}catch(e){}
  var isL=document.body.classList.contains('light');
  /* Initialiser compteurs nb secteurs */
  var CNTS={ad:545,ss:307,ml:166,mut:118,msa:45,gps:19,rq:21,ft:16};
  var tot=2168;
  for(var sk in CNTS){
    var el=document.getElementById('nb-'+sk);
    if(el)el.textContent='('+CNTS[sk]+')';
    tot+=CNTS[sk];
  }
  var elAll=document.getElementById('nb-all');
  if(elAll)elAll.textContent='('+tot+')';
  updLeg();
  /* Carte Leaflet */
  _map=L.map('map',{zoomControl:true,attributionControl:false,preferCanvas:true});
  L.tileLayer(
    isL?'https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}.png'
       :'https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}.png',
    {maxZoom:10,subdomains:'abcd'}
  ).addTo(_map);
  function mkLayer(geo){
    return L.geoJSON(geo,{
      style:function(f){return getStyle(f);},
      onEachFeature:function(f,layer){
        layer.bindPopup(mkPop(f),{maxWidth:280});
        layer.on('mouseover',function(e){
          e.target.setStyle({weight:2,color:'#fff',fillOpacity:.9});
          e.target.bringToFront();
        });
        layer.on('mouseout',function(){render();});
      }
    });
  }
  /* Charger GeoJSON via XHR */
  var DU='https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/departements-version-simplifiee.geojson';
  var RU='https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/regions-version-simplifiee.geojson';
  function xhrJ(url,cb){
    var x=new XMLHttpRequest();
    x.open('GET',url,true);x.timeout=15000;
    x.onload=function(){if(x.status===200)try{cb(JSON.parse(x.responseText));}catch(e){console.error(e);}};
    x.onerror=function(){console.warn('XHR error',url);};
    x.ontimeout=function(){console.warn('XHR timeout',url);};
    x.send();
  }
  xhrJ(DU,function(g){
    _ld=mkLayer(g);
    _ld.addTo(_map);
    setTimeout(function(){
      _map.invalidateSize(true);
      _map.fitBounds(_ld.getBounds());
    },200);
  });
  xhrJ(RU,function(g){_lr=mkLayer(g);});
  window.addEventListener('resize',function(){if(_map)_map.invalidateSize();});
});
</script>
</body>
