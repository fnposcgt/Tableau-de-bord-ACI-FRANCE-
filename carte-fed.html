<head>

<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Carte Fédérale FNPOS-CGT</title>

<style>
:root{--bg:#0f1117;--bg2:#181c27;--bg3:#1e2334;--bd:#2a3050;--tx:#e8ecf4;--tx2:#9aa3bd;--tx3:#6b7494;--sh:0 2px 14px rgba(0,0,0,.4)}
body.light{--bg:#f0f2f8;--bg2:#fff;--bg3:#e8ebf4;--bd:#d0d5e8;--tx:#1a1d2e;--tx2:#4a5070;--tx3:#8892b0;--sh:0 2px 14px rgba(0,0,0,.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);height:100vh;display:flex;flex-direction:column;overflow:hidden}
#tb{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--bg2);border-bottom:1px solid var(--bd);flex-shrink:0;z-index:1000}
#tb h1{font-size:13px;font-weight:700;white-space:nowrap}
#tb h1 span{color:#E24B4A}
#tmbtn{margin-left:auto;padding:4px 8px;border-radius:5px;border:1px solid var(--bd);background:var(--bg3);color:var(--tx2);font-size:12px;cursor:pointer;flex-shrink:0}
a.back{display:inline-flex;align-items:center;gap:3px;padding:4px 9px;border-radius:5px;border:1px solid var(--bd);background:var(--bg3);color:var(--tx2);font-size:11px;text-decoration:none;flex-shrink:0}
#main{flex:1;display:flex;min-height:0}
#sb{width:210px;min-width:210px;background:var(--bg2);border-right:1px solid var(--bd);overflow-y:auto;display:flex;flex-direction:column;flex-shrink:0}
@media(max-width:580px){#sb{width:100%;min-width:0;max-height:170px;flex-direction:row;overflow-x:auto;overflow-y:hidden;border-right:none;border-bottom:1px solid var(--bd)}#main{flex-direction:column}.fs{min-width:130px}}
#mw{flex:1;position:relative;min-height:0}
#map{width:100%;height:100%}
.fs{padding:9px 10px 6px;border-bottom:1px solid var(--bd)}
.ft{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:7px}
.sf{display:flex;align-items:center;gap:5px;width:100%;padding:5px 8px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--tx2);font-size:11px;font-weight:600;cursor:pointer;transition:all .12s;text-align:left;margin-bottom:3px}
.sf .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sf .nb{margin-left:auto;font-size:9px;opacity:.6;font-weight:400}
.sf:hover{background:var(--bg3)}
.sf.active{border-color:currentColor;background:color-mix(in srgb,currentColor 12%,transparent)}
#ball{border-color:#E24B4A;color:#E24B4A}
#ball.active{background:rgba(226,75,74,.12)}
.mb{display:flex;align-items:center;gap:6px;width:100%;padding:5px 8px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--tx2);font-size:11px;cursor:pointer;margin-bottom:3px;text-align:left}
.mb:hover{background:var(--bg3)}
.mb.active{border-color:#E24B4A;background:rgba(226,75,74,.1);color:var(--tx);font-weight:600}
.sl-w{margin-bottom:8px}
.sl-l{display:flex;justify-content:space-between;font-size:10px;color:var(--tx2);margin-bottom:4px}
.sl-l b{color:var(--tx)}
input[type=range]{width:100%;height:4px;accent-color:#E24B4A;background:var(--bg3);border-radius:2px;cursor:pointer}
#statsb{position:absolute;bottom:20px;left:10px;z-index:900;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:7px 11px;font-size:11px;display:flex;gap:12px;box-shadow:var(--sh)}
.si{text-align:center}
.sv{font-size:15px;font-weight:700;color:#E24B4A;line-height:1.1}
.sl{font-size:9px;color:var(--tx3);margin-top:2px;white-space:nowrap}
#leg{position:absolute;bottom:20px;right:10px;z-index:900;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:9px 11px;font-size:10px;box-shadow:var(--sh)}
#legt{font-weight:700;font-size:11px;margin-bottom:6px;color:var(--tx)}
.lr{display:flex;align-items:center;gap:6px;margin-bottom:3px;color:var(--tx2)}
.ls{width:11px;height:11px;border-radius:2px;flex-shrink:0}
#acibar{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:950;background:var(--bg2);border:1px solid var(--bd);border-radius:7px;padding:5px 12px;font-size:11px;color:var(--tx2);box-shadow:var(--sh);display:none}
.leaflet-popup-content-wrapper{background:var(--bg2)!important;border:1px solid var(--bd)!important;border-radius:8px!important;box-shadow:0 4px 20px rgba(0,0,0,.3)!important}
.leaflet-popup-content{color:var(--tx)!important;font-size:12px!important;margin:10px 14px!important;max-width:260px}
.leaflet-popup-tip{background:var(--bg2)!important}
.pr{display:flex;justify-content:space-between;padding:2px 0;font-size:11px;border-bottom:1px solid var(--bd)}
.pr:last-of-type{border:none}
.pk{color:var(--tx2)}.pv{font-weight:600}
.pp{display:flex;flex-wrap:wrap;gap:3px;margin-top:7px}
.pi{border-radius:3px;padding:2px 6px;font-size:10px;font-weight:700}
.plink{display:block;margin-top:7px;font-size:10px;text-decoration:none;color:#E24B4A}
</style>
</head>

  var secs=_sec==='all'?Object.keys(DEPT_STATS):[_sec];
  for(var i=0;i<secs.length;i++){
    var sk=secs[i];
    var d=(DEPT_STATS[sk]||{})[c]||(DEPT_STATS[sk]||{})[code];
    if(!d) continue;
    r.nb+=d.nb||0; r['in']+=d['in']||0;
    r.cgt+=d.cgt||0; r.sve+=d['in']||0;
    if(d.pa===null&&(d.nb||0)>0)r.paNull=true;
    if((d.nb||0)>0)r.secs.push(sk);
  }
  r.pa=r.sve>0?Math.round(r.cgt/r.sve*100*10)/10:(r.paNull?null:null);
  return r;
}
function getStyle(f){
  var d=getDept(f.properties.code);
  var ok=(_mode!=='score')||(d.pa===null&&d.nb>0)||(d.pa!==null&&d.pa>=_msc);
  if(!ok||d.nb<_mst)return{fillColor:'#1e2740',fillOpacity:.15,color:'#1a2035',weight:.7,opacity:.7};
  var col,op=.75;
  if(_mode==='score')col=_col(d.pa,d.nb);
  else if(_mode==='structs')col=_colS(d.nb);
  else col=d.nb>0?'#16a34a':'#1e2740';
  return{fillColor:col,fillOpacity:op,color:'#0f1117',weight:.8,opacity:.9};
}
function makePop(f){
  var code=f.properties.code,nom=f.properties.nom;
  var d=getDept(code);
  var h='<div style="font-weight:700;font-size:13px;margin-bottom:8px">'+nom+' ('+code+')</div>';
  if(!d.nb)return h+'<div style="color:var(--tx3);font-size:11px">Aucune structure</div>';
  h+='<div class="pr"><span class="pk">Structures</span><span class="pv">'+d.nb+'</span></div>';
  if(d['in']>0)h+='<div class="pr"><span class="pk">Inscrits</span><span class="pv">'+d['in'].toLocaleString('fr-FR')+'</span></div>';
  if(d.pa!==null)h+='<div class="pr"><span class="pk">Score CGT</span><span class="pv" style="color:#E24B4A">'+d.pa+'%</span></div>';
  else if(d.nb>0)h+='<div class="pr"><span class="pk">Score CGT</span><span class="pv" style="color:#4a6fa5">Chargement…</span></div>';
  if(_sec==='all'&&d.secs.length){
    h+='<div class="pp">';
    for(var i=0;i<d.secs.length;i++){var sm=SECS_META[d.secs[i]];
      var sd=(DEPT_STATS[d.secs[i]]||{})[code]||(DEPT_STATS[d.secs[i]]||{})[code.replace(/^0/,'')];
      h+='<span class="pi" style="background:'+sm.color+'22;color:'+sm.color+'">'
        +sm.icon+' '+d.secs[i].toUpperCase()+(sd&&sd.pa!==null?' · '+sd.pa+'%':'')+'</span>';
    }
    h+='</div>';
  }
  if(_sec!=='all'){var sm=SECS_META[_sec];
    var href=_sec==='aci'?'app.html?readonly':'app-secteur.html?sec='+_sec+'&readonly';
    h+='<a href="'+href+'" class="plink">→ Tableau de bord '+sm.label+'</a>';
  }
  return h;
}
function render(){
  var layer=_zm==='dept'?_ld:_lr; if(!layer) return;
  layer.eachLayer(function(l){
    l.setStyle(getStyle(l.feature));
    l.unbindPopup(); l.bindPopup(makePop(l.feature),{maxWidth:280});
  });
  updStats(); updLeg();
}
function updStats(){
  var nb=0,ins=0,cgt=0,sve=0,nd=0;
  var secs=_sec==='all'?Object.keys(DEPT_STATS):[_sec];
  var seen={};
  for(var i=0;i<secs.length;i++){for(var d in(DEPT_STATS[secs[i]]||{})){
    var v=DEPT_STATS[secs[i]][d]; if(!v||v.nb<_mst)continue;
    if(!seen[d]){seen[d]=1;nd++;}
    nb+=v.nb||0; ins+=v['in']||0; cgt+=v.cgt||0; sve+=v['in']||0;
  }}
  var pa=sve>0?Math.round(cgt/sve*100)+'%':'—';
  document.getElementById('sbs').textContent=nb.toLocaleString('fr-FR');
  document.getElementById('sbd').textContent=nd;
  document.getElementById('sbi').textContent=ins.toLocaleString('fr-FR');
  document.getElementById('sbc').textContent=pa;
}
function updLeg(){
  var t=document.getElementById('legt'),b=document.getElementById('legb');
  if(_mode==='score'){
    t.textContent='Score CGT %';
    b.innerHTML='<div class="lr"><div class="ls" style="background:#15803d"></div>≥ 50 %</div>'
      +'<div class="lr"><div class="ls" style="background:#16a34a"></div>40–50 %</div>'
      +'<div class="lr"><div class="ls" style="background:#65a30d"></div>30–40 %</div>'
      +'<div class="lr"><div class="ls" style="background:#ca8a04"></div>20–30 %</div>'
      +'<div class="lr"><div class="ls" style="background:#dc2626"></div>10–20 %</div>'
      +'<div class="lr"><div class="ls" style="background:#9f1239"></div>&lt; 10 %</div>'
      +'<div class="lr"><div class="ls" style="background:#4a6fa5"></div>En chargement</div>'
      +'<div class="lr"><div class="ls" style="background:#1e2740"></div>Non présent</div>';
  } else if(_mode==='structs'){
    t.textContent='Nb structures';
    b.innerHTML='<div class="lr"><div class="ls" style="background:#0369a1"></div>≥ 100</div>'
      +'<div class="lr"><div class="ls" style="background:#0891b2"></div>50–99</div>'
      +'<div class="lr"><div class="ls" style="background:#0ea5e9"></div>20–49</div>'
      +'<div class="lr"><div class="ls" style="background:#38bdf8"></div>10–19</div>'
      +'<div class="lr"><div class="ls" style="background:#7dd3fc"></div>5–9</div>'
      +'<div class="lr"><div class="ls" style="background:#bae6fd"></div>1–4</div>';
  } else {
    t.textContent='Présence CGT';
    b.innerHTML='<div class="lr"><div class="ls" style="background:#16a34a"></div>Présente</div>'
      +'<div class="lr"><div class="ls" style="background:#1e2740"></div>Absente</div>';
  }
}
function setSector(sk){
  _sec=sk;
  document.querySelectorAll('.sf').forEach(function(b){b.classList.remove('active');});
  var btn=document.getElementById(sk==='all'?'ball':'b-'+sk);
  if(btn)btn.classList.add('active');
  render();
}
function setMode(m){
  _mode=m;
  document.querySelectorAll('.mb[id^=m-]').forEach(function(b){b.classList.remove('active');});
  document.getElementById('m-'+m).classList.add('active');
  render();
}
function setZoom(z){
  _zm=z;
  document.querySelectorAll('.mb[id^=z-]').forEach(function(b){b.classList.remove('active');});
  document.getElementById('z-'+z).classList.add('active');
  if(_ld&&_lr){
    if(z==='dept'){if(!_map.hasLayer(_ld))_map.addLayer(_ld);if(_map.hasLayer(_lr))_map.removeLayer(_lr);}
    else{if(_map.hasLayer(_ld))_map.removeLayer(_ld);if(!_map.hasLayer(_lr))_map.addLayer(_lr);}
  }
  render();
}
function onSl(){
  _msc=parseInt(document.getElementById('slsc').value)||0;
  _mst=parseInt(document.getElementById('slst').value)||1;
  document.getElementById('lsc').textContent=_msc;
  document.getElementById('lst').textContent=_mst;
  render();
}
function toggleTheme(){
  document.body.classList.toggle('light');
  var l=document.body.classList.contains('light');
  document.getElementById('tmbtn').textContent=l?'🌙':'☀️';
  try{localStorage.setItem('fnpos_theme',l?'light':'dark');}catch(e){}
  if(_map)_map.eachLayer(function(lyr){
    if(lyr._url&&lyr._url.includes('carto')){
      lyr.setUrl(l?'https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}.png'
                  :'https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}.png');
    }
  });
}

/* ── ACI depuis Supabase ── */
function _aciDept(s){
  var c=String(s.cp||'').replace(/[^0-9]/g,'');
  if(c.length>=2){var n=parseInt(c.substring(0,2));return n===20?'2A':String(n);}
  return String(s.d||'');
}
function aciBase(){
  var r={};
  for(var i=0;i<ACI_MIN.length;i++){
    var dept=_aciDept(ACI_MIN[i]);
    if(!dept||dept==='0')continue;
    if(!r[dept])r[dept]={nb:0,'in':0,pa:null,cgt:0,cfdt:0,fo:0};
    r[dept].nb++;
  }
  return r;
}
function loadACI(){
  DEPT_STATS.aci=aciBase();
  render();
  var bar=document.getElementById('acibar'); if(bar)bar.style.display='block';
  var xhr=new XMLHttpRequest();
  xhr.open('GET',SB_URL+'/rest/v1/aci_sync?id=eq.1&select=edits',true);
  xhr.setRequestHeader('apikey',SB_KEY);
  xhr.setRequestHeader('Authorization','Bearer '+SB_KEY);
  xhr.timeout=9000;
  xhr.onload=function(){
    if(bar)bar.style.display='none';
    if(xhr.status!==200)return;
    try{
      var rows=JSON.parse(xhr.responseText);
      if(!rows||!rows[0]||!rows[0].edits)return;
      var edits=typeof rows[0].edits==='string'?JSON.parse(rows[0].edits):rows[0].edits;
      var patches=edits.structs||{};
      /* Index si→dept */
      var sid={};
      for(var i=0;i<ACI_MIN.length;i++)sid[ACI_MIN[i].si]=_aciDept(ACI_MIN[i]);
      /* Agréger */
      var agg=aciBase();
      for(var dept in agg)agg[dept]['in']=0,agg[dept].cgt=0,agg[dept].cfdt=0,agg[dept].fo=0,agg[dept].sve=0;
      for(var si in patches){
        var p=patches[si], dept=sid[si];
        if(!dept)continue;
        if(!agg[dept])agg[dept]={nb:0,'in':0,pa:null,cgt:0,cfdt:0,fo:0,sve:0};
        var d=agg[dept];
        var insc=parseFloat(p['in'])||0;
        d['in']+=insc; d.sve+=insc;
        /* pa en % dans les edits (ex: 34.59) */
        var pa=parseFloat(p.pa)||0;
        d.cgt+=pa*insc/100;
        d.cfdt+=parseFloat(p.cf||p.cfdt)||0;
        d.fo+=parseFloat(p.fo)||0;
      }
      for(var dept in agg){
        var d=agg[dept];
        d.pa=d.sve>0&&d.cgt>0?Math.round(d.cgt/d.sve*100*10)/10:
             (d.sve>0?0:null);
        d.cgt=Math.round(d.cgt);
      }
      DEPT_STATS.aci=agg;
      render();updStats();
    }catch(e){console.warn('ACI parse',e);}
  };
  xhr.onerror=function(){if(bar)bar.style.display='none';};
  xhr.send();
}

/* ── Init carte ── */
document.addEventListener('DOMContentLoaded',function(){
  try{var sv=localStorage.getItem('fnpos_theme');if(sv==='light'){document.body.classList.add('light');document.getElementById('tmbtn').textContent='🌙';}}catch(e){}
  var isL=document.body.classList.contains('light');
  _map=L.map('map',{zoomControl:true,attributionControl:false});
  L.tileLayer(isL?'https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}.png'
                  :'https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}.png',{maxZoom:10}).addTo(_map);
  var DU='https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/departements-version-simplifiee.geojson';
  var RU='https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/regions-version-simplifiee.geojson';
  function mkL(geo){
    return L.geoJSON(geo,{
      style:function(f){return getStyle(f);},
      onEachFeature:function(f,layer){
        layer.bindPopup(makePop(f),{maxWidth:280});
        layer.on('mouseover',function(e){e.target.setStyle({weight:2,color:'#fff',fillOpacity:.9});e.target.bringToFront();});
        layer.on('mouseout',function(){render();});
      }
    });
  }
  fetch(DU).then(function(r){return r.json();}).then(function(g){
    _ld=mkL(g); _ld.addTo(_map); _map.fitBounds(_ld.getBounds()); loadACI();
  }).catch(function(e){console.error('GeoJSON dept',e);});
  fetch(RU).then(function(r){return r.json();}).then(function(g){
    _lr=mkL(g);
  }).catch(function(e){console.error('GeoJSON reg',e);});
});
</script>
