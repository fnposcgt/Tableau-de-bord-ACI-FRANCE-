var COLORS = {cgt:'#E24B4A', cfdt:'#378ADD', fo:'#EF9F27', solidaires:'#639922', cftc:'#9B59B6', cgc:'#1ABC9C'};
var tip = document.getElementById('tip');

function showTip(e, html) {
  tip.innerHTML = html;
  tip.style.display = 'block';
  tip.style.left = (e.clientX + 12) + 'px';
  tip.style.top  = (e.clientY - 8)  + 'px';
}
function hideTip() { tip.style.display = 'none'; }
function fmt(n) { return n > 0 ? n.toLocaleString('fr-FR') : ''; }

var map = L.map('map', {scrollWheelZoom:true, attributionControl:false, zoomControl:true});
map.fitBounds([[41.2,-5.5],[51.2,10.2]]);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

var xhr = new XMLHttpRequest();
xhr.open('GET','https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/regions-version-simplifiee.geojson');
xhr.onload = function() {
  if (xhr.status !== 200) return;
  var gj = JSON.parse(xhr.responseText);
  var maxC = 0;
  for (var k in RS) { if (RS[k].count > maxC) maxC = RS[k].count; }
  if (!maxC) maxC = 1;

  L.geoJSON(gj, {
    style: function(ft) {
      var rsKey = INSEE_REG_MAP[ft.properties.code] || null;
      var dk = rsKey ? (RS[rsKey] || null) : null;
      if (!dk || dk.count === 0) return {fillColor:'#333', fillOpacity:0.5, color:'#555', weight:1};
      var g = dk.gagnant || '';
      var fill = COLORS[g.toLowerCase()] || '#888';
      var op = 0.35 + 0.45 * (dk.count / maxC);
      return {fillColor:fill, fillOpacity:op, color:'#222', weight:1};
    },
    onEachFeature: function(ft, layer) {
      var rsKey = INSEE_REG_MAP[ft.properties.code] || null;
      var dk = rsKey ? (RS[rsKey] || null) : null;
      var nom = ft.properties.nom;
      layer.on({
        mouseover: function(e) {
          layer.setStyle({weight:2, color:'#fff'});
          var html = '<div style="font-weight:700;margin-bottom:4px">' + nom + '</div>';
          if (dk && dk.count > 0) {
            html += dk.count + ' structure' + (dk.count > 1 ? 's' : '');
            if (dk.insc > 0) html += '<br>' + fmt(dk.insc) + ' inscrits · ' + dk.part + '% part.';
            if (dk.gagnant) html += '<br><span style="color:' + (COLORS[dk.gagnant.toLowerCase()]||'#888') + ';font-weight:700">▶ ' + dk.gagnant.toUpperCase() + '</span>';
          } else {
            html += '<span style="color:#666">Pas de données</span>';
          }
          showTip(e.originalEvent, html);
        },
        mousemove: function(e) {
          tip.style.left = (e.originalEvent.clientX + 12) + 'px';
          tip.style.top  = (e.originalEvent.clientY - 8)  + 'px';
        },
        mouseout: function() { L.geoJSON(gj).resetStyle(layer); hideTip(); },
        click: function() {
          if (!dk) return;
          var html = '<b>' + nom + '</b><br>' + dk.count + ' structures';
          if (dk.insc) html += '<br>' + fmt(dk.insc) + ' inscrits';
          if (dk.gagnant) html += '<br>Maj: ' + dk.gagnant.toUpperCase();
          layer.bindPopup(html).openPopup();
        }
      });
      /* Label nombre de structures */
      if (dk && dk.count > 0) {
        try {
          var c = layer.getBounds().getCenter();
          L.marker(c, {
            icon: L.divIcon({
              className: '',
              html: '<div style="font-size:11px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.8);pointer-events:none">' + dk.count + '</div>',
              iconSize: [30, 16],
              iconAnchor: [15, 8]
            })
          }).addTo(map);
        } catch(e) {}
      }
    }
  }).addTo(map);
};
