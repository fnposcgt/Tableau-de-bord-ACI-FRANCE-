<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau de bord ACI France</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #1a1a2e;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-box {
    background: white;
    border-radius: 12px;
    padding: 40px 32px;
    width: 320px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .logo {
    width: 80px;
    margin-bottom: 16px;
  }
  h1 {
    font-size: 16px;
    font-weight: 700;
    color: #CC0000;
    margin-bottom: 4px;
  }
  p {
    font-size: 12px;
    color: #888;
    margin-bottom: 28px;
  }
  input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 16px;
    letter-spacing: 2px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 12px;
  }
  input:focus { border-color: #CC0000; }
  button {
    width: 100%;
    padding: 12px;
    background: #CC0000;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #aa0000; }
  .error {
    color: #CC0000;
    font-size: 13px;
    margin-top: 10px;
    display: none;
  }
</style>
</head>
<body>
<div class="login-box">
  <img class="logo" src="logo-cgt.png" onerror="this.style.display='none'">
  <h1>Tableau de bord ACI France</h1>
  <p>CGT Fédération des Organismes Sociaux</p>
  <input type="password" id="pwd" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')check()">
  <button onclick="check()">Accéder</button>
  <div class="error" id="err">Mot de passe incorrect</div>
</div>
<script>
  // Vérifier si déjà authentifié
  if(sessionStorage.getItem('aci_auth') === '1') {
    window.location.href = 'app.html';
  }
  function check() {
    var pwd = document.getElementById('pwd').value;
    if(pwd === 'Org@soc93100') {
      sessionStorage.setItem('aci_auth', '1');
      window.location.href = 'app.html';
    } else {
      document.getElementById('err').style.display = 'block';
      document.getElementById('pwd').value = '';
      document.getElementById('pwd').focus();
    }
  }
</script>
</body>
</html>
